version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/doll_shop
      - APP_NAME=Doll Shop API
      - APP_VERSION=0.1.0
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=doll_shop
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations

volumes:
  postgres_data: