apiVersion: apps/v1
kind: Deployment
metadata:
  name: doll-shop-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doll-shop-api
  template:
    metadata:
      labels:
        app: doll-shop-api
    spec:
      containers:
      - name: doll-shop-api
        image: doll-shop-api:latest
        ports:
        - containerPort: 9999
        envFrom:
        - configMapRef:
            name: doll-shop-config
        - secretRef:
            name: doll-shop-secrets
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /docs
            port: 9999
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /docs
            port: 9999
          initialDelaySeconds: 15
          periodSeconds: 5
